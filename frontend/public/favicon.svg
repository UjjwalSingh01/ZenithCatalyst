<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>Zenith Catalyst</title>
  <!-- The ember ground travels with the mark, so the flame keeps its contrast
       against light chrome, dark chrome, and a white bookmarks bar. -->
  <rect width="64" height="64" rx="14" fill="#16100F"/>

  <defs>
    <linearGradient id="body" x1="32" y1="56" x2="32" y2="6" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8F5334"/>
      <stop offset="0.4" stop-color="#C97B4E"/>
      <stop offset="1" stop-color="#E2996A"/>
    </linearGradient>
    <linearGradient id="core" x1="32" y1="54" x2="32" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F2B544"/>
      <stop offset="1" stop-color="#FFD27D"/>
    </linearGradient>
  </defs>

  <!-- A flame, not a droplet: a sharp tip, a swollen right shoulder, and a lean.
       A symmetric round-topped teardrop reads as water — the exact metaphor this
       product replaced — so the point at the top is doing real work. -->
  <path
    d="M32 4c3 13 17 22 16 35a16 16 0 0 1-32 1c0-11 8-14 11-24 1.5-4.5 3.5-9 5-12Z"
    fill="url(#body)"/>

  <!-- The hot core sits low, where a real fire is hottest. -->
  <path
    d="M32 29c1.5 8 8 11 7.5 17a7.5 7.5 0 0 1-15 0c0-6 5.5-9 7.5-17Z"
    fill="url(#core)"/>
</svg>
